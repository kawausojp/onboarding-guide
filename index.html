<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新人報到指南</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:   #faf8f3;
  --ivory:   #f2efe6;
  --white:   #ffffff;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --purple:  #4a3fa0;
  --purple2: #6b5fd4;
  --rose:    #c0436e;
  --teal:    #0c9272;
  --ink:     #1c1a2e;
  --muted:   #8a8799;
  --border:  #e6e2d8;
  --done-bg: #edfaf5;
  --done-bd: #9de4c8;
  --sh-sm: 0 1px 4px rgba(28,26,46,0.06), 0 2px 12px rgba(28,26,46,0.04);
  --sh-md: 0 4px 20px rgba(28,26,46,0.10), 0 1px 4px rgba(28,26,46,0.06);
}

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

/* full-page light bg safety net */
html { background: var(--cream); }

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 45% at 8% 0%,  rgba(201,168,76,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 92% 100%, rgba(74,63,160,0.08) 0%, transparent 55%);
}

/* ══ HEADER ══════════════════════════════════ */
header {
  position: relative; z-index: 20;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--sh-sm);
  padding: 0 52px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: stretch;
}

.hdr-left {
  padding: 38px 44px 38px 0;
  border-right: 1px solid var(--border);
}
.brand-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px;
}
.brand-badge span { display: block; width: 24px; height: 1px; background: var(--gold); opacity: 0.6; }

h1 {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(28px, 4vw, 46px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.02em;
  padding-bottom: 4px;
}
h1 .accent {
  background: linear-gradient(120deg, var(--purple) 0%, var(--rose) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  display: inline-block;
  padding: 0 2px 4px 2px;
}
h1 .byline {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.3em; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); -webkit-text-fill-color: var(--muted);
  margin-top: 6px;
}

.hdr-right {
  padding: 38px 0 38px 44px;
  display: flex; flex-direction: column; align-items: flex-end; justify-content: center;
}
.hdr-stat {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 52px; font-weight: 900; line-height: 1;
  background: linear-gradient(120deg, var(--purple), var(--rose));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-stat sub { font-size: 0.38em; font-weight: 700; vertical-align: baseline; }
.hdr-stat-label {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted); margin-top: 5px;
}

/* gold rule */
.gold-rule {
  height: 3px; position: relative; z-index: 20;
  background: linear-gradient(90deg, transparent, var(--gold) 25%, var(--gold2) 50%, var(--gold) 75%, transparent);
}

/* ══ PROGRESS STRIP ══════════════════════════ */
.prog-strip {
  position: relative; z-index: 20;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 14px 52px;
  display: flex; align-items: center; gap: 18px;
}
.prog-lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.prog-track { flex: 1; height: 5px; background: var(--ivory); border-radius: 99px; overflow: visible; position: relative; }
.prog-fill {
  height: 100%; background: linear-gradient(90deg, var(--purple), var(--rose));
  border-radius: 99px; width: 0%;
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.prog-fill::after {
  content: '';
  position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 0 3px rgba(192,67,110,0.2), 0 0 10px rgba(192,67,110,0.4);
  opacity: 0; transition: opacity 0.3s;
}
.prog-fill.active::after { opacity: 1; }
.prog-pct { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700; color: var(--purple); flex-shrink: 0; min-width: 36px; text-align: right; }

/* ══ DAY TABS ════════════════════════════════ */
.day-tabs {
  position: relative; z-index: 20;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 52px;
  display: flex; overflow-x: auto; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  padding: 17px 26px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.22s;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.day-tab:hover { color: var(--ink); }
.day-tab.active { color: var(--purple); border-bottom-color: var(--purple); }
.tab-pip {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal); opacity: 0; transition: opacity 0.3s; flex-shrink: 0;
}
.day-tab.all-done .tab-pip { opacity: 1; }

/* ══ MAIN ════════════════════════════════════ */
.main {
  position: relative; z-index: 10;
  max-width: 880px; margin: 0 auto;
  padding: 48px 40px 100px;
  background: var(--cream);
}

.day-panel { display: none; }
.day-panel.active { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* day header */
.day-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
}
.dh-left { flex: 1; }
.dh-eyebrow {
  display: flex; align-items: center; gap: 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
}
.dh-eyebrow::after { content: ''; width: 60px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
.day-title {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: clamp(20px, 3.5vw, 30px);
  font-weight: 900; letter-spacing: -0.01em; line-height: 1.2;
}
.day-title i { font-style: normal; }
.day-sub { font-size: 12px; color: var(--muted); margin-top: 8px; letter-spacing: 0.04em; }

/* ring */
.ring-wrap { position: relative; width: 76px; height: 76px; flex-shrink: 0; }
.ring-svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--ivory); stroke-width: 5; }
.ring-arc { fill: none; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 195; stroke-dashoffset: 195; transition: stroke-dashoffset 0.65s cubic-bezier(.4,0,.2,1); }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-family: 'Noto Sans TC', sans-serif; font-size: 16px; font-weight: 700; line-height: 1; }
.ring-of  { font-size: 9px; color: var(--muted); margin-top: 1px; letter-spacing: 0.04em; }

/* ══ TODO ITEMS — grid aligned ═══════════════ */
.todo-list { display: flex; flex-direction: column; gap: 8px; }

.todo-item {
  display: grid;
  grid-template-columns: 52px 84px 1fr;
  align-items: stretch;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  box-shadow: var(--sh-sm);
  user-select: none;
  min-height: 66px;
}
.todo-item:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-md), 0 0 0 3px rgba(74,63,160,0.10);
  border-color: var(--purple2);
}
.todo-item.done { background: var(--done-bg); border-color: var(--done-bd); }
.todo-item.done:hover { border-color: var(--teal); box-shadow: var(--sh-md), 0 0 0 3px rgba(12,146,114,0.12); }

/* col 1 – checkbox */
.col-check {
  display: flex; align-items: center; justify-content: center;
  background: var(--ivory);
  border-right: 1px solid var(--border);
  transition: background 0.2s;
}
.todo-item:hover .col-check { background: #ede9ff; }
.todo-item.done .col-check { background: var(--teal); border-color: var(--teal); }
.todo-item.done:hover .col-check { background: #0aaa85; }
.chk-box {
  width: 22px; height: 22px; border-radius: 7px;
  border: 2px solid #d0cde6;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: var(--white);
  color: transparent;
  transition: all 0.2s;
}
.todo-item:hover .chk-box { border-color: var(--purple2); }
.todo-item.done .chk-box { background: transparent; border-color: rgba(255,255,255,0.5); color: #fff; }

/* col 2 – tag */
.col-tag {
  display: flex; align-items: center; justify-content: center;
  padding: 0 10px;
  border-right: 1px solid var(--border);
}
.todo-item.done .col-tag { border-color: var(--done-bd); }
.tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 9px; border-radius: 6px;
  white-space: nowrap; text-align: center;
}

/* col 3 – text */
.col-text {
  display: flex; align-items: center;
  padding: 16px 22px;
}
.todo-text {
  font-size: 13.5px; line-height: 1.65;
  color: var(--ink); transition: color 0.2s;
}
.todo-item.done .todo-text {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: var(--done-bd);
}

/* tag colors */
.tag-行政 { background: #edeaff; color: #4a3fa0; }
.tag-了解 { background: #e6f7f1; color: #0a7a5c; }
.tag-研究 { background: #fce8ef; color: #a8305a; }
.tag-製作 { background: #fef5df; color: #946810; }
.tag-撰寫 { background: #e2edff; color: #2a52a8; }
.tag-企劃 { background: #fce8ef; color: #a8305a; }
.tag-測試 { background: #e6f7f1; color: #0a7a5c; }
.tag-分析 { background: #fff0e4; color: #944a18; }
.tag-交付 { background: #e6f7f1; color: #0a7a5c; }

/* ══ COMPLETE BANNER ══════════════════════════ */
.complete-banner {
  display: none;
  margin-top: 28px; padding: 30px 36px;
  border-radius: 18px;
  background: linear-gradient(135deg, #edfaf5 0%, #f6f0ff 100%);
  border: 1px solid var(--done-bd);
  text-align: center; overflow: hidden; position: relative;
  animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1);
}
.complete-banner.show { display: block; }
.complete-banner::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.10) 0%, transparent 70%);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.88) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.banner-emoji { font-size: 42px; margin-bottom: 10px; }
.complete-banner h3 {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 22px; font-weight: 900; color: var(--teal);
}
.complete-banner p { font-size: 13px; color: var(--muted); margin-top: 6px; }
.banner-stars { color: var(--gold); font-size: 20px; letter-spacing: 6px; margin-top: 10px; }

/* ══ CONFETTI ════════════════════════════════ */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
.confetti-piece { position: absolute; border-radius: 2px; animation: fall linear forwards; }
@keyframes fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translateY(108vh) rotate(760deg); opacity: 0; }
}

/* ══ RESPONSIVE ══════════════════════════════ */
@media (max-width: 640px) {
  header { padding: 0 20px; grid-template-columns: 1fr; }
  .hdr-right { display: none; }
  .hdr-left { border-right: none; }
  .prog-strip, .day-tabs, .main { padding-left: 16px; padding-right: 16px; }
  .todo-item { grid-template-columns: 44px 72px 1fr; }
  .col-text { padding: 14px 16px; }
  .todo-text { font-size: 13px; }
}
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<header>
  <div class="hdr-left">
    <div class="brand-badge"><span></span>新人 · Onboarding<span></span></div>
    <h1>
      新人<span class="accent">報到</span>指南
      <span class="byline">First Week Quest · 2026</span>
    </h1>
  </div>
  <div class="hdr-right">
    <div class="hdr-stat" id="hdrStat">0<sub> / 0</sub></div>
    <div class="hdr-stat-label">Tasks Completed</div>
  </div>
</header>

<div class="gold-rule"></div>

<div class="prog-strip">
  <span class="prog-lbl">Overall Progress</span>
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <span class="prog-pct" id="progPct">0%</span>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="main" id="mainContent"></div>

<script>
const DAYS = [
  {
    num:1, label:"DAY 1", theme:"環境建置 & 品牌觀察", color:"#4a3fa0",
    todos:[
      {tag:"行政", text:"開通所有帳號權限：信箱、專案管理工具、內部溝通軟體、各社群平台後台管理員"},
      {tag:"了解", text:"閱讀內部社群規範文件，了解發文流程、素材管理方式與內容審核機制"},
      {tag:"了解", text:"完成指定 e-learning 課程，建立社群行銷基礎 know-how"},
      {tag:"了解", text:"瀏覽熟悉公司旗下各官網頁面，了解產品定位與使用者旅程"},
      {tag:"分析", text:"觀察公司官方社群帳號近 30 則貼文，整理 3 個 Insight，並提出初步後續營運策略建議"},
    ]
  },
  {
    num:2, label:"DAY 2", theme:"內容製作入門", color:"#c0436e",
    todos:[
      {tag:"製作", text:"更新官方通訊軟體圖文選單：確認版型規格、替換素材、送審並完成上線"},
      {tag:"製作", text:"製作本週定期貼文（如職缺報）：整理資訊、套用模板、完成各社群平台版本"},
      {tag:"企劃", text:"短影音企劃發想：列出 5 個可拍攝的主題，每個附上受眾、核心訴求與內容形式"},
      {tag:"撰寫", text:"為定期貼文撰寫各平台發文文案（注意不同平台受眾與語氣差異）"},
      {tag:"交付", text:"將貼文成品與文案上傳至指定資料夾，請 Mentor 審閱並記錄修改建議"},
    ]
  },
  {
    num:3, label:"DAY 3", theme:"短影音 & 貼文製作", color:"#0c9272",
    todos:[
      {tag:"企劃", text:"與 Mentor 確認短影音主題，完成 30 秒腳本（Hook 3 秒 / 正文 20 秒 / CTA 7 秒）"},
      {tag:"製作", text:"依腳本完成短影音拍攝，注意構圖、光線與收音品質"},
      {tag:"製作", text:"使用剪輯工具完成剪輯：字幕、背景音樂、轉場、封面圖、品牌 Logo"},
      {tag:"企劃", text:"梗圖或文章精華貼文企劃：選定主題，規劃視覺方向與文案角度"},
      {tag:"製作", text:"完成梗圖 / 精華貼文製作，確保符合品牌 Guideline，上傳至指定資料夾請 Mentor 審閱"},
    ]
  },
  {
    num:4, label:"DAY 4", theme:"競品研究 & 策略深化", color:"#946810",
    todos:[
      {tag:"研究", text:"蒐集 3–5 個競品社群帳號，分析各平台的內容策略、發文節奏與互動表現"},
      {tag:"分析", text:"觀察 3 個優質同產業品牌帳號，整理其吸引受眾的內容手法與視覺語言"},
      {tag:"分析", text:"查看公司各平台數據後台，找出近一個月表現最佳的 3 則貼文並分析原因"},
      {tag:"撰寫", text:"整理競品研究報告：記錄各競品的強項、弱項與可借鑒之處，輸出至內部文件"},
      {tag:"企劃", text:"根據競品研究，提出 2–3 個下週可執行的內容優化方向，與 Mentor 討論可行性"},
    ]
  },
  {
    num:5, label:"DAY 5", theme:"AI 工具應用 & 週回顧", color:"#7b3fc4",
    todos:[
      {tag:"測試", text:"AI 工具實測：分別測試用 AI 生成社群文案、製作貼文腳本、發想主題，記錄哪些 prompt 效果最好"},
      {tag:"測試", text:"探索 AI 輔助工具應用：嘗試協助圖卡文案撰寫、標籤建議、受眾分析等場景"},
      {tag:"撰寫", text:"整理本週 AI 測試心得：哪些任務適合用 AI 加速、哪些仍需人工判斷，輸出至內部文件"},
      {tag:"分析", text:"回顧本週所有產出，自評品質並條列下週改善方向"},
      {tag:"企劃", text:"與 Mentor 進行週回顧：展示本週成果、討論第二週任務分配，設定個人 OKR（1 技能目標 + 1 產出目標）"},
    ]
  },
];

const state = (() => {
  try { return JSON.parse(localStorage.getItem('ob_v3')) || null; } catch { return null; }
})() || Object.fromEntries(DAYS.map(d => [d.num, new Array(d.todos.length).fill(false)]));

let active = 1;
const save = () => { try { localStorage.setItem('ob_v3', JSON.stringify(state)); } catch{} };

function renderTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = '';
  DAYS.forEach(d => {
    const allDone = state[d.num].every(Boolean);
    const btn = document.createElement('button');
    btn.className = `day-tab${active===d.num?' active':''}${allDone?' all-done':''}`;
    btn.innerHTML = `${d.label}<span class="tab-pip"></span>`;
    btn.onclick = () => { active = d.num; render(); };
    el.appendChild(btn);
  });
}

function renderMain() {
  const el = document.getElementById('mainContent');
  el.innerHTML = '';
  DAYS.forEach(d => {
    const done = state[d.num].filter(Boolean).length;
    const total = d.todos.length;
    const pct = total ? done/total : 0;
    const circ = 195;
    const offset = circ - pct * circ;

    const panel = document.createElement('div');
    panel.className = `day-panel${active===d.num?' active':''}`;
    panel.innerHTML = `
      <div class="day-header">
        <div class="dh-left">
          <div class="dh-eyebrow">Week 1 &nbsp;·&nbsp; Day ${d.num}</div>
          <div class="day-title">
            <i style="color:${d.color}">Day ${d.num}</i>
            &thinsp;—&thinsp;${d.theme}
          </div>
          <div class="day-sub">${done} / ${total} 項已完成</div>
        </div>
        <div class="ring-wrap">
          <svg class="ring-svg" width="76" height="76" viewBox="0 0 76 76">
            <circle class="ring-bg" cx="38" cy="38" r="31"/>
            <circle class="ring-arc" cx="38" cy="38" r="31"
              style="stroke:${d.color}; stroke-dashoffset:${offset}"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" style="color:${d.color}">${Math.round(pct*100)}%</div>
            <div class="ring-of">${done}/${total}</div>
          </div>
        </div>
      </div>

      <div class="todo-list">
        ${d.todos.map((t,i) => `
          <div class="todo-item${state[d.num][i]?' done':''}" data-day="${d.num}" data-idx="${i}">
            <div class="col-check">
              <div class="chk-box">${state[d.num][i]?'✓':''}</div>
            </div>
            <div class="col-tag">
              <span class="tag tag-${t.tag}">${t.tag}</span>
            </div>
            <div class="col-text">
              <div class="todo-text">${t.text}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="complete-banner${done===total?' show':''}" id="banner-${d.num}">
        <div class="banner-emoji">🎊</div>
        <h3>Day ${d.num} 全部完成！</h3>
        <p>太厲害了，完美地完成了這天所有任務 ✨</p>
        <div class="banner-stars">★ ★ ★ ★ ★</div>
      </div>
    `;
    el.appendChild(panel);
  });

  document.querySelectorAll('.todo-item').forEach(item => {
    item.addEventListener('click', () => {
      const d = +item.dataset.day, i = +item.dataset.idx;
      const wasAll = state[d].every(Boolean);
      state[d][i] = !state[d][i];
      save();
      if (state[d].every(Boolean) && !wasAll) confetti();
      render();
    });
  });
}

function renderStats() {
  const total = DAYS.reduce((s,d) => s+d.todos.length, 0);
  const done  = DAYS.reduce((s,d) => s+state[d.num].filter(Boolean).length, 0);
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('hdrStat').innerHTML = `${done}<sub> / ${total}</sub>`;
  const fill = document.getElementById('progFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('active', done > 0);
  document.getElementById('progPct').textContent = pct + '%';
}

function confetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#4a3fa0','#c0436e','#c9a84c','#0c9272','#7b3fc4','#e8c97a','#f0a0c0'];
  for (let i = 0; i < 110; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const sz = 5 + Math.random()*9;
    p.style.cssText = `left:${Math.random()*100}%;top:-12px;width:${sz}px;height:${sz}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.8+Math.random()*2.4}s;animation-delay:${Math.random()*0.7}s;`;
    wrap.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function render() { renderTabs(); renderMain(); renderStats(); }
render();
</script>
</body>
</html>
